name: CI/CD Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Build da imagem Docker
        run: docker build -t clothes-app .

      - name: Parar container antigo
        run: |
          docker stop clothes-app || true
          docker rm clothes-app || true

      - name: Subir novo container
        run: docker run -d -p 5000:5000 --name clothes-app clothes-app