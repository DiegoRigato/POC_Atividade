name: CI/CD Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Build da imagem Docker
        run: docker build -t clothes-app .

      - name: Testar container
        run: docker run -d -p 5000:5000 clothes-app